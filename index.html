<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/news-hub-logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Primary Meta Tags -->
    <title>News Hub | Your Daily Dose of Top Headlines</title>
    <meta name="title" content="News Hub | Your Daily Dose of Top Headlines" />
    <meta name="description" content="Stay updated with the latest news from around the world. News Hub provides real-time top headlines across various categories including business, technology, sports, health, and entertainment." />
    <meta name="keywords" content="news, daily news, news app, top headlines, business news, technology news, sports news, world news" />
    <meta name="author" content="News Hub" />
    <meta name="theme-color" content="#ef4444" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://newshub.vercel.app/" />
    <meta property="og:title" content="News Hub | Your Daily Dose of Top Headlines" />
    <meta property="og:description" content="Stay updated with the latest news from around the world. News Hub provides real-time top headlines across various categories." />
    <!-- Ideally point og:image to a deployed image URL representing your app -->
    <meta property="og:image" content="https://via.placeholder.com/1200x630.png?text=News+Hub" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://newshub.vercel.app/" />
    <meta property="twitter:title" content="News Hub | Your Daily Dose of Top Headlines" />
    <meta property="twitter:description" content="Stay updated with the latest news from around the world. News Hub provides real-time top headlines across various categories." />
    <meta property="twitter:image" content="https://via.placeholder.com/1200x630.png?text=News+Hub" />

    <!-- Fonts for Material UI -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
